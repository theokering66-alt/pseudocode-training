<!DOCTYPE html>
<html>
<head>
  <title>IGCSE 0478 Pseudocode Trainer</title>
  <style>
    body{
      font-family: Arial;
      background:#0f172a;
      color:white;
      padding:40px;
    }
    textarea{
      width:100%;
      height:250px;
      margin-top:10px;
      font-family:monospace;
    }
    button{
      margin-top:10px;
      padding:10px 20px;
      font-size:16px;
      cursor:pointer;
    }
    #result{
      margin-top:20px;
      padding:15px;
      background:#1e293b;
    }
  </style>
</head>

<body>

<h1>IGCSE 0478 Pseudocode Trainer</h1>

<h3>Question</h3>
<p>
Input 5 numbers and output the total.
</p>

<textarea id="answer" placeholder="Write your pseudocode here..."></textarea>

<br>

<button onclick="mark()">Check Answer</button>

<div id="result"></div>

<script>

function mark(){

let code = document.getElementById("answer").value.toLowerCase()
let marks = 0
let feedback = []

if(code.includes("input")){
marks++
feedback.push("✔ Input detected")
}

if(code.includes("for") || code.includes("while") || code.includes("repeat")){
marks++
feedback.push("✔ Loop detected")
}

if(code.includes("total")){
marks++
feedback.push("✔ Total variable used")
}

if(code.includes("total +")){
marks+=2
feedback.push("✔ Adding numbers to total")
}

if(code.includes("output")){
marks++
feedback.push("✔ Output detected")
}

document.getElementById("result").innerHTML =
"<h3>Score: "+marks+"/6</h3>" + feedback.join("<br>")

}

</script>

</body>
</html>
