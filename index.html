<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IGCSE Pseudocode Trainer</title>
<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#e5eefc}
.app{max-width:1200px;margin:auto;padding:14px}
h1{margin:0;font-size:26px}
.subtitle{color:#9fb0c9;font-size:13px;margin:4px 0 12px}
.layout{display:grid;grid-template-columns:190px 1fr;gap:12px}
.card{background:#111827;border:1px solid #243041;border-radius:12px}
.card-body{padding:10px}
.menu button{width:100%;margin-bottom:6px;padding:8px;border-radius:8px;border:1px solid #243041;background:#0f172a;color:#e5eefc;cursor:pointer;font-size:13px}
.menu button.active{background:#0284c7}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.tag{border:1px solid #243041;padding:4px 8px;border-radius:999px;font-size:11px;color:#9fb0c9}
.question{background:#0a1324;border:1px solid #243041;padding:8px;border-radius:8px;font-family:monospace;font-size:13px}
.editor{display:grid;grid-template-columns:40px 1fr;border:1px solid #243041;border-radius:10px;overflow:hidden;background:#050b16;margin-top:6px}
.lines{background:#0c1424;color:#6f86a8;text-align:right;padding:8px;font-family:monospace;font-size:12px;line-height:1.5}
textarea{background:#050b16;color:white;border:0;outline:none;padding:8px;font-family:monospace;font-size:13px;line-height:1.5;resize:none;min-height:240px}
.actions{margin-top:6px;display:flex;gap:6px;flex-wrap:wrap}
.actions button{padding:6px 10px;border-radius:8px;border:1px solid #243041;background:#0f172a;color:white;font-size:12px;cursor:pointer}
.actions button.primary{background:#0284c7}
.grid{display:grid;grid-template-columns:1.2fr 0.9fr;gap:12px;margin-top:12px}
.box{background:#0a1324;border:1px solid #243041;border-radius:10px;padding:8px;font-size:12px}
.score{font-size:28px;font-weight:bold}
.progress{height:8px;background:#0a1324;border:1px solid #243041;border-radius:999px;overflow:hidden;margin:6px 0}
.bar{height:100%;background:#22c55e;width:0%}
.success{background:rgba(34,197,94,.15);padding:6px;border-radius:6px;margin-bottom:4px}
.issue{background:rgba(239,68,68,.15);padding:6px;border-radius:6px;margin-bottom:4px}
.tip{background:rgba(245,158,11,.15);padding:6px;border-radius:6px;margin-bottom:4px}
.hidden{display:none}
@media(max-width:900px){.layout,.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
<h1>IGCSE 0478 Pseudocode Trainer</h1>
<div class="subtitle">Practice pseudocode, get automatic marking and improve your exam answers.</div>

<div class="layout">

<div class="card menu card-body">
<button class="active" onclick="show('practice')">Practice</button>
<button onclick="show('learn')">Learning</button>
<button onclick="show('scheme')">Marking</button>
</div>

<div>

<div id="practice">
<div class="card card-body">
<div class="tags">
<span class="tag" id="topic"></span>
<span class="tag" id="level"></span>
<span class="tag" id="marks"></span>
</div>
<div id="question" class="question"></div>

<div class="editor">
<pre class="lines" id="lines">1</pre>
<textarea id="code"></textarea>
</div>

<div class="actions">
<button class="primary" onclick="run()">Run</button>
<button onclick="clearCode()">Clear</button>
<button onclick="nextQ()">Next</button>
</div>
</div>

<div class="grid">

<div class="card card-body">
<div>Status: <span id="status">Waiting</span></div>
<div class="box" id="output"></div>
</div>

<div class="card card-body">
<div class="score" id="score">0/0</div>
<div class="progress"><div class="bar" id="bar"></div></div>
<div id="comment"></div>
</div>

</div>

<div class="card card-body" style="margin-top:10px">
<div id="feedback"></div>
</div>

</div>

<div id="learn" class="hidden card card-body">
<b>Pseudocode Basics</b>
<div class="tip">INPUT gets data from the user.</div>
<div class="tip">OUTPUT shows the result.</div>
<div class="tip">Use IF / ELSE / ENDIF for decisions.</div>
<div class="tip">Use FOR or WHILE for loops.</div>
</div>

<div id="scheme" class="hidden card card-body">
<div id="schemeContent"></div>
</div>

</div>
</div>
</div>

<script>
const questions=[
{q:"Input 5 numbers and output the total",marks:8,topic:"Loops",level:"Beginner",checks:["input","total","for","output"]},
{q:"Input a number and output Even or Odd",marks:8,topic:"Selection",level:"Beginner",checks:["input","if","mod","output"]},
{q:"Input 5 numbers and output the largest",marks:10,topic:"Arrays",level:"Intermediate",checks:["input","array","largest","if"]}
]

let qi=0

function render(){
let q=questions[qi]
document.getElementById("topic").innerText="Topic: "+q.topic
document.getElementById("level").innerText=q.level
document.getElementById("marks").innerText="Marks: "+q.marks
document.getElementById("question").innerText=q.q
}

function updateLines(){
let count=Math.max(1,code.value.split("\n").length)
lines.textContent=Array.from({length:count},(_,i)=>i+1).join("\n")
}

function run(){
let codeText=code.value.toLowerCase()
let q=questions[qi]
let score=0

q.checks.forEach(c=>{if(codeText.includes(c))score++})

let percent=Math.round(score/q.checks.length*100)
scoreDisplay=q.marks

score.innerText=Math.round(percent/100*q.marks)+"/"+q.marks
bar.style.width=percent+"%"

if(percent>80)comment.innerText="Excellent"
else if(percent>50)comment.innerText="Good but improve structure"
else comment.innerText="Try again"

output.innerText="Preview executed"
status.innerText="Run complete"

feedback.innerHTML=""
q.checks.forEach(c=>{
if(codeText.includes(c))feedback.innerHTML+=`<div class='success'>Found: ${c}</div>`
else feedback.innerHTML+=`<div class='issue'>Missing: ${c}</div>`
})
}

function nextQ(){qi=(qi+1)%questions.length;render();clearCode()}
function clearCode(){code.value="";updateLines()}

function show(view){
practice.classList.add("hidden")
learn.classList.add("hidden")
scheme.classList.add("hidden")

document.getElementById(view).classList.remove("hidden")
}

code.addEventListener("input",updateLines)
render()
updateLines()
</script>
</body>
</html>
